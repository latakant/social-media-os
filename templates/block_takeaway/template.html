<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="{{ base_css_url }}">
<style>:root { --canvas-w:{{ canvas_w }}px; --canvas-h:{{ canvas_h }}px; {{ style_css }} }</style>
<style>
body {
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 0;
  position: relative;
}
body::before {
  content: '';
  position: fixed; left: 0; top: 0; bottom: 0; width: 5px;
  background: linear-gradient(180deg, var(--primary), var(--primary-dark));
  z-index: 2;
}
.top {
  position: relative; z-index: 1;
  padding: 20px var(--sp-xl) 0;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
  height: 12%;
}
.middle {
  flex: 1;
  position: relative; z-index: 1;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: var(--sp-lg) var(--sp-xl);
  text-align: center; gap: var(--sp-md);
}
.label {
  font-size: var(--t-detail); font-weight: 700; letter-spacing: 3px;
  color: var(--primary); text-transform: uppercase;
}
.highlight {
  font-size: 38px; font-weight: 900; line-height: 1.2;
  background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  max-width: 820px;
}
.bottom {
  position: relative; z-index: 1;
  padding: 0 var(--sp-xl);
  height: 20%;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
  background: var(--bg-card-2);
}
.slide-num { font-size: var(--t-detail); font-weight: 700; color: var(--primary); letter-spacing: 2px; }
</style>
</head>
<body class="{{ body_class }}">
  <div class="top">
    <div class="tag">{{ topic | upper }}</div>
    <div class="brand">Building in Public &bull; <em>AI Agents</em></div>
  </div>
  <div class="middle">
    <div class="label">Key Takeaway</div>
    <div class="accent-bar" style="width:60px;"></div>
    <div class="highlight">{{ highlight }}</div>
  </div>
  <div class="bottom">
    <div class="slide-num">{{ slide_label }}</div>
    <div class="brand">Building in Public &bull; <em>AI Agents</em></div>
  </div>
</body>
</html>
