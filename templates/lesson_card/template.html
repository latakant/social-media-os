<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:1200px; height:1200px; overflow:hidden;
  background:#0F172A;
  font-family:'Inter',-apple-system,sans-serif;
  color:#F8FAFC;
  display:flex; flex-direction:column; justify-content:space-between;
  padding:72px 80px;
  position:relative;
  -webkit-font-smoothing:antialiased;
}

/* AI illustration — right side fade */
.illustration {
  position:fixed; right:0; top:0; bottom:0; width:50%;
  z-index:0; overflow:hidden;
}
.illustration img {
  width:100%; height:100%; object-fit:cover;
  opacity:0.15;
  mask-image:linear-gradient(to right, transparent, rgba(0,0,0,0.6) 60%);
  -webkit-mask-image:linear-gradient(to right, transparent, rgba(0,0,0,0.6) 60%);
}

/* left accent */
body::before {
  content:'';
  position:fixed; left:0; top:0; bottom:0; width:5px;
  background:linear-gradient(180deg,#38BDF8,#0284C7);
  z-index:1;
}

.top, .middle, .bottom { position:relative; z-index:2; }

.top { display:flex; justify-content:space-between; align-items:center; }
.tag { font-size:13px; font-weight:700; letter-spacing:3px; color:#38BDF8; text-transform:uppercase; }
.lesson-num { font-size:13px; font-weight:700; color:#1E3A5F; letter-spacing:1px; }

.middle { flex:1; display:flex; flex-direction:column; justify-content:center; gap:32px; padding:60px 0; }

.headline {
  font-size:76px; font-weight:900; line-height:1.0;
  background:linear-gradient(135deg,#F8FAFC 0%,#38BDF8 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  max-width:700px;
}

.accent-bar { width:56px; height:4px; background:linear-gradient(90deg,#38BDF8,transparent); border-radius:2px; }

.body-text {
  font-size:26px; font-weight:400; color:#94A3B8; line-height:1.65;
  max-width:640px;
}
.body-text strong { color:#CBD5E1; font-weight:600; }

.bottom { display:flex; justify-content:space-between; align-items:center; }
.context { font-size:14px; color:#334155; }
.brand { font-size:14px; color:#334155; font-weight:600; }
.brand em { color:#38BDF8; font-style:normal; }
</style>
</head>
<body>
  {% if illustration %}
  <div class="illustration"><img src="{{ illustration }}" /></div>
  {% endif %}

  <div class="top">
    <div class="tag">LESSON LEARNED</div>
    <div class="lesson-num">LESSON #{{ lesson_number }}</div>
  </div>

  <div class="middle">
    <div class="headline">{{ headline }}</div>
    <div class="accent-bar"></div>
    <div class="body-text">{{ body }}</div>
  </div>

  <div class="bottom">
    <div class="context">{{ context }}</div>
    <div class="brand">Building in Public &bull; <em>AI Agents</em></div>
  </div>
</body>
</html>
