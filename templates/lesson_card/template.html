<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>:root { --canvas-w:{{ canvas_w }}px; --canvas-h:{{ canvas_h }}px; }</style>
<link rel="stylesheet" href="{{ base_css_url }}">
<style>
body {
  display:flex; flex-direction:column; justify-content:space-between;
  padding:72px var(--sp-xl);
  position:relative;
}
body::before {
  content:''; position:fixed; left:0; top:0; bottom:0; width:5px;
  background:linear-gradient(180deg, var(--primary), var(--primary-dark)); z-index:1;
}

.illustration {
  position:fixed; right:0; top:0; bottom:0; width:50%;
  z-index:0; overflow:hidden;
}
.illustration img {
  width:100%; height:100%; object-fit:cover; opacity:0.15;
  mask-image:linear-gradient(to right, transparent, rgba(0,0,0,0.6) 60%);
  -webkit-mask-image:linear-gradient(to right, transparent, rgba(0,0,0,0.6) 60%);
}

.top, .middle, .bottom { position:relative; z-index:2; }

.top { display:flex; justify-content:space-between; align-items:center; }
.lesson-num { font-size:var(--t-xs); font-weight:700; color:var(--arrow); letter-spacing:1px; }

.middle { flex:1; display:flex; flex-direction:column; justify-content:center; gap:32px; padding:60px 0; }

.headline {
  font-size:var(--t-3xl); font-weight:900; line-height:1.0;
  background:linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  max-width:700px;
}

.body-text {
  font-size:26px; font-weight:400; color:var(--text-muted); line-height:1.65;
  max-width:640px;
}
.body-text strong { color:var(--text-2); font-weight:600; }

.bottom { display:flex; justify-content:space-between; align-items:center; }
.context { font-size:14px; color:var(--text-faint); }
</style>
</head>
<body>
  {% if illustration %}
  <div class="illustration"><img src="{{ illustration }}" /></div>
  {% endif %}

  <div class="top">
    <div class="tag">LESSON LEARNED</div>
    <div class="lesson-num">LESSON #{{ lesson_number }}</div>
  </div>

  <div class="middle">
    <div class="headline">{{ headline }}</div>
    <div class="accent-bar"></div>
    <div class="body-text">{{ body }}</div>
  </div>

  <div class="bottom">
    <div class="context">{{ context }}</div>
    <div class="brand">Building in Public &bull; <em>AI Agents</em></div>
  </div>
</body>
</html>
