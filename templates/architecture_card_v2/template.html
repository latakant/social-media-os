<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="{{ base_css_url }}">
<style>:root { --canvas-w:{{ canvas_w }}px; --canvas-h:{{ canvas_h }}px; {{ style_css }} }</style>
{% from 'design-system/icons.html' import icon %}
<style>
body {
  display: grid;
  grid-template-rows: 18% 77% 5%;
  position: relative;
}

.header {
  position: relative; z-index: 1;
  padding: 32px var(--sp-xl) 0;
  display: flex; justify-content: space-between; align-items: flex-start;
  border-bottom: 1px solid var(--border);
}
.hero {
  font-size: var(--t-hero);
  font-weight: 900;
  line-height: 0.88;
  background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  font-size: var(--t-detail);
  color: var(--text-subtle);
  margin-top: 8px;
}
.footer {
  position: relative; z-index: 1;
  padding: 0 var(--sp-xl);
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
}
.key-insight {
  font-size: var(--t-detail);
  color: var(--text-dim);
  font-style: italic;
  flex: 1;
  text-align: center;
  padding: 0 var(--sp-sm);
}

/* ── SVG elements — using style= for CSS var support ───── */
</style>
</head>
<body class="{{ body_class }}">

  <div class="header">
    <div>
      <div class="tag">ARCHITECTURE</div>
      <div class="hero">{{ hero }}</div>
      <div class="subtitle">{{ subtitle }}</div>
    </div>
    <div class="brand">Building in Public &bull; <em>AI Agents</em></div>
  </div>

  <!-- SVG diagram fills the 77% grid row -->
  <div style="position:relative; z-index:1; overflow:hidden; width:100%; height:100%;">
    <svg width="{{ canvas_w }}" height="{{ svg_h }}"
         viewBox="0 0 {{ canvas_w }} {{ svg_h }}"
         xmlns="http://www.w3.org/2000/svg">

      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerUnits="strokeWidth" markerWidth="7" markerHeight="5"
                orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z"
                style="fill: var(--primary);"/>
        </marker>
        <marker id="arrow-dim" viewBox="0 0 10 10" refX="9" refY="5"
                markerUnits="strokeWidth" markerWidth="7" markerHeight="5"
                orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z"
                style="fill: var(--text-dim);"/>
        </marker>
      </defs>

      <!-- Phase column separators + labels ───────────────── -->
      {% for phase_name, plabel in phase_labels.items() %}
      {% if plabel.col_idx > 0 %}
      <line x1="{{ plabel.x - col_w / 2 }}" y1="0"
            x2="{{ plabel.x - col_w / 2 }}" y2="{{ svg_h }}"
            style="stroke: var(--border); stroke-width: 1;"/>
      {% endif %}
      <text x="{{ plabel.x }}" y="{{ plabel.y }}" text-anchor="middle"
            style="fill: var(--text-subtle); font-size: 11px; font-weight: 700;
                   letter-spacing: 2px; text-transform: uppercase;
                   font-family: var(--font-family);">
        {{ phase_name }}
      </text>
      {% endfor %}

      <!-- Edges (behind nodes) ───────────────────────────── -->
      {% for edge in edges %}
      {% if edge.from in positions and edge.to in positions %}
      {% set fp = positions[edge.from] %}
      {% set tp = positions[edge.to] %}
      {% if fp.col_idx < tp.col_idx %}
      {% set gap = tp.left_x - fp.right_x %}
      {% set cp1x = fp.right_x + gap * 0.45 %}
      {% set cp2x = tp.left_x - gap * 0.45 %}
      <path d="M {{ fp.right_x | round(1) }} {{ fp.cy | round(1) }}
               C {{ cp1x | round(1) }} {{ fp.cy | round(1) }}
                 {{ cp2x | round(1) }} {{ tp.cy | round(1) }}
                 {{ tp.left_x | round(1) }} {{ tp.cy | round(1) }}"
            style="stroke: var(--primary); stroke-width: 1.5; fill: none; opacity: 0.7;"
            marker-end="url(#arrow)"/>
      {% if edge.label %}
      <text x="{{ ((fp.right_x + tp.left_x) / 2) | round(1) }}"
            y="{{ ((fp.cy + tp.cy) / 2 - 10) | round(1) }}"
            text-anchor="middle"
            style="fill: var(--text-muted); font-size: 10px;
                   font-family: var(--font-family);">
        {{ edge.label }}
      </text>
      {% endif %}
      {% endif %}
      {% endif %}
      {% endfor %}

      <!-- Nodes ──────────────────────────────────────────── -->
      {% for node in nodes %}
      {% if node.id in positions %}
      {% set pos = positions[node.id] %}
      <g transform="translate({{ pos.x | round(1) }}, {{ pos.y | round(1) }})">

        <!-- Card background -->
        <rect width="{{ pos.w }}" height="{{ pos.h }}" rx="8"
              style="fill: var(--bg-card); stroke: var(--border); stroke-width: 1;"/>

        <!-- Left accent bar -->
        <rect x="0" y="0" width="3" height="{{ pos.h }}" rx="1.5"
              style="fill: var(--primary);"/>

        <!-- Icon (24px, vertically centred, at x=14) -->
        <g transform="translate(14, {{ ((pos.h - 24) / 2) | round(1) }})">
          {{ icon(node.icon, 24) }}
        </g>

        <!-- Label -->
        {% if node.detail %}
        <text x="48" y="{{ (pos.h / 2 - 8) | round(1) }}" dy=".35em"
              style="fill: var(--text); font-size: 17px; font-weight: 700;
                     font-family: var(--font-family);">
          {{ node.label[:22] }}
        </text>
        <text x="48" y="{{ (pos.h / 2 + 13) | round(1) }}"
              style="fill: var(--text-subtle); font-size: 11px;
                     font-family: var(--font-family);">
          {{ node.detail[:30] }}
        </text>
        {% else %}
        <text x="48" y="{{ (pos.h / 2) | round(1) }}" dy=".35em"
              style="fill: var(--text); font-size: 17px; font-weight: 700;
                     font-family: var(--font-family);">
          {{ node.label[:22] }}
        </text>
        {% endif %}

      </g>
      {% endif %}
      {% endfor %}

    </svg>
  </div>

  <div class="footer">
    <div class="accent-bar"></div>
    <div class="key-insight">{{ footer_insight }}</div>
    <div class="brand">Building in Public &bull; <em>AI Agents</em></div>
  </div>

</body>
</html>
