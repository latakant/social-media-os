<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="{{ base_css_url }}">
<style>:root { --canvas-w:{{ canvas_w }}px; --canvas-h:{{ canvas_h }}px; {{ style_css }} }</style>
<style>

/* ── Canvas ─────────────────────────────────────────────── */
body {
  width: var(--canvas-w);
  height: var(--canvas-h);
  background: var(--bg);
  font-family: var(--font-family);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  padding: 28px 32px 16px;
  gap: 16px;
  box-sizing: border-box;
}

/* ── Hero header ─────────────────────────────────────────── */
.hero-section {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--primary);
  flex-shrink: 0;
}
.hero-left { display: flex; flex-direction: column; gap: 4px; }
.hero-title {
  font-size: 52px;
  font-weight: 900;
  line-height: 1.0;
  color: var(--text);
  letter-spacing: -1px;
}
/* light theme: plain dark text; dark theme: gradient */
body:not(.bg-light) .hero-title {
  background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero-subtitle {
  font-size: 13px;
  color: var(--text-subtle);
  font-weight: 500;
  letter-spacing: 0.2px;
}
.hero-right {
  text-align: right;
  font-size: 11px;
  color: var(--text-faint);
  font-weight: 600;
}
.hero-right em { color: var(--primary); font-style: normal; }

/* ── Section grid ─────────────────────────────────────────── */
.grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: 1fr;
  gap: 10px;
  min-height: 0;
}

/* ── Section card ─────────────────────────────────────────── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
body.bg-light .card {
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
body:not(.bg-light) .card {
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}

.card-header {
  padding: 8px 12px;
  background: var(--primary);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  flex-shrink: 0;
}
body.bg-light .card-header {
  color: #FFFFFF;
}
body:not(.bg-light) .card-header {
  color: var(--bg);
}

/* Alternate header tint for visual rhythm */
.card:nth-child(3n+2) .card-header { background: var(--primary-dark); }
.card:nth-child(3n+3) .card-header { opacity-bg: 0.85; }

.card-body {
  flex: 1;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  gap: 0;
}

/* ── Item row ─────────────────────────────────────────────── */
.item {
  display: flex;
  align-items: baseline;
  gap: 6px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  min-height: 0;
}
.item:last-child { border-bottom: none; }

.item-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 80px;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-sep {
  font-size: 10px;
  color: var(--text-faint);
  flex-shrink: 0;
}
.item-desc {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.35;
  min-width: 0;
  word-break: break-word;
}

/* ── Footer ───────────────────────────────────────────────── */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.footer-note {
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
}
.accent-bar {
  width: 36px; height: 3px;
  background: linear-gradient(90deg, var(--primary), transparent);
  border-radius: 2px;
}
</style>
</head>
<body class="{{ body_class }}">

  <div class="hero-section">
    <div class="hero-left">
      <div class="tag" style="font-size:10px; letter-spacing:3px;">CHEAT SHEET</div>
      <div class="hero-title">{{ hero }}</div>
      <div class="hero-subtitle">{{ subtitle }}</div>
    </div>
    <div class="hero-right">
      Building in Public &bull; <em>AI Agents</em>
    </div>
  </div>

  <div class="grid">
    {% for section in sections %}
    <div class="card">
      <div class="card-header">{{ section.name }}</div>
      <div class="card-body">
        {% for item in section['items'] %}
        <div class="item">
          <span class="item-name">{{ item.name }}</span>
          <span class="item-sep">—</span>
          <span class="item-desc">{{ item.desc }}</span>
        </div>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>

  <div class="footer">
    <div class="footer-note">{{ footer_note }}</div>
    <div class="accent-bar"></div>
  </div>

</body>
</html>
