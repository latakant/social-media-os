<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="{{ base_css_url }}">
<style>:root { --canvas-w:{{ canvas_w }}px; --canvas-h:{{ canvas_h }}px; {{ style_css }} }</style>
<style>
body { display:flex; flex-direction:column; position:relative; }

.bg-art img { opacity:0.05; filter:blur(12px); }
.bg-art::after { background:none; }

.header {
  position:relative; z-index:1;
  padding:48px var(--sp-xl) 36px;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.arena {
  position:relative; z-index:1;
  flex:1; display:grid; grid-template-columns:1fr 100px 1fr;
  padding:0 40px;
}
.side { padding:40px; display:flex; flex-direction:column; }
.side-name { font-size:44px; font-weight:900; margin-bottom:32px; line-height:1.0; }
.side-left  .side-name { color:var(--danger); }
.side-right .side-name { color:var(--success); }

.row {
  padding:18px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:20px; font-weight:500; line-height:1.4;
  display:flex; align-items:center; gap:12px;
}
.row-icon { font-size:16px; flex-shrink:0; }
.side-left  .row { color:var(--text-muted); }
.side-right .row { color:var(--text-2); }

.vs-col {
  display:flex; flex-direction:column; align-items:center;
  justify-content:flex-start; padding-top:40px;
}
.vs-badge {
  background:linear-gradient(135deg, var(--primary), var(--primary-dark));
  color:#fff; font-size:20px; font-weight:900;
  width:60px; height:60px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 30px rgba(56,189,248,0.3);
  margin-bottom:20px; flex-shrink:0;
}
.vs-line { width:1px; flex:1; background:linear-gradient(180deg, var(--border-accent), transparent); }

.footer {
  position:relative; z-index:1;
  padding:24px var(--sp-xl);
  background:rgba(30,41,59,0.8);
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex; align-items:center; justify-content:center;
}
.verdict { font-size:18px; color:var(--text-subtle); text-align:center; line-height:1.5; }
.verdict strong { color:var(--primary); font-weight:700; }
</style>
</head>
<body class="{{ body_class }}">
  {% if illustration %}
  <div class="bg-art"><img src="{{ illustration }}" /></div>
  {% endif %}

  <div class="top-bar"></div>
  <div class="header">
    <div class="tag">COMPARISON</div>
    <div class="brand">Building in Public &bull; <em>AI Agents</em></div>
  </div>

  <div class="arena">
    <div class="side side-left">
      <div class="side-name">{{ left_name }}</div>
      {% for row in rows %}
      <div class="row"><span class="row-icon">✗</span>{{ row.left }}</div>
      {% endfor %}
    </div>

    <div class="vs-col">
      <div class="vs-badge">VS</div>
      <div class="vs-line"></div>
    </div>

    <div class="side side-right">
      <div class="side-name">{{ right_name }}</div>
      {% for row in rows %}
      <div class="row"><span class="row-icon">✓</span>{{ row.right }}</div>
      {% endfor %}
    </div>
  </div>

  <div class="footer">
    <div class="verdict">{{ verdict }}</div>
  </div>
</body>
</html>
